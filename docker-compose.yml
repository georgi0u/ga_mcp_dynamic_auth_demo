services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: mcp_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ADDR: :8080
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8080}
      CLIENT_APP_URL: ${CLIENT_APP_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mcp_auth?sslmode=disable
      RESET_DATABASE_ON_FIRST_START: ${RESET_DATABASE_ON_FIRST_START:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      SESSION_TTL: 24h
      REQUEST_TIMEOUT: 60s
      BOOTSTRAP_EMAIL: ${BOOTSTRAP_EMAIL:-demo@example.com}
      BOOTSTRAP_PASSWORD: ${BOOTSTRAP_PASSWORD:-demo-password}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-0123456789abcdefghijklmnopqrstuv}
    ports:
      - "8080:8080"

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8080}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:3000"

volumes:
  postgres-data:
